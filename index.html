<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Sitio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img id="Empresalogo" src="logo.png" alt="Logo" />
    <h1>Bienvenido a mi página</h1>
    <img id="title-image" src="titulo.png" alt="Imagen de título" />
  </header>

  <form>
    <input type="text" placeholder="Buscar..." />
    <button type="submit">Buscar</button>
  </form>

  <section>
    <aside>
      <h2>Noticias</h2>
      <p>¡Contenido interesante aquí!</p>
    </aside>
    <div id="foto1">
      <img src="foto1.jpg" alt="Foto 1" />
    </div>
    <div id="foto2">
      <img src="foto2.jpg" alt="Foto 2" />
    </div>
    <div class="gif">
      <img src="animacion.gif" alt="GIF" />
    </div>
  </section>

  <div class="container">
    <button class="btn">¡Haz clic!</button>
  </div>

  <div class="comentarios-container">
    <h2>Comentarios</h2>
    <form class="comentario-form">
      <input class="input" type="text" placeholder="Escribe tu comentario" />
      <button class="btn" type="submit">Enviar</button>
    </form>
  </div>

  <footer>
    <div class="footer-content">
      <div class="social-icons">
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
      </div>
      <div class="official-link">
        <a href="#">Sitio Oficial</a>
      </div>
      <div class="legal-links">
        <a href="#">Términos</a>
        <a href="#">Privacidad</a>
      </div>
    </div>
  </footer>
</body>
</html>
